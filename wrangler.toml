name = "openstrap-backend"
compatibility_date = "2024-04-01"

main = "src/index.ts"

[[d1_databases]]
binding = "DB"
database_name = "openstrap-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[r2_buckets]]
binding = "RAW_BUCKET"
bucket_name = "openstrap-raw"

# Analytics queue (producer + consumer). ENABLED on Workers Paid. The cron just
# ENQUEUES one (user, job) message per unit of work; the consumer processes one
# bounded unit per invocation, so heavy R2 jobs (biometrics/resp/steps) never hit
# the 1000-subrequest per-invocation cap. ingest.ts also enqueues a 'sweep' on
# upload (falls back to analytics_cursor.dirty=1 if the binding is absent).
# max_batch_size = 1 → exactly one (user, job) per invocation (guaranteed bounded).
[[queues.producers]]
binding = "ANALYTICS_Q"
queue = "openstrap-analytics"

[[queues.consumers]]
queue = "openstrap-analytics"
max_batch_size = 1
max_batch_timeout = 10
max_retries = 3
dead_letter_queue = "openstrap-analytics-dlq"

# Crons: 30-min sweep (re-derive dirty users → keeps "today" fresh; pure-read
# endpoints serve this snapshot) + nightly full re-derive/prune. Any non-nightly
# cron string falls through to the sweep branch in scheduled(); only "30 3 * * *"
# triggers the nightly path. (Future: tighten the sweep to */15 if needed.)
[triggers]
crons = ["*/30 * * * *", "30 3 * * *"]

[vars]
EMAIL_FROM_NAME = "OpenStrap"